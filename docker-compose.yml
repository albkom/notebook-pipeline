services:
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025

  python:
    build: .
    volumes:
      - .:/app          # live-reload: edits on host are instantly visible in container
    env_file:
      - .env
    working_dir: /app
    depends_on:
      - mailhog
